---
# Update app code and restart service
# Usage: ansible-playbook update.yml --ask-vault-pass

- name: Update app
  hosts: devices
  become: true

  vars_files:
    - vault.yml

  tasks:
    - name: Stop app service
      ansible.builtin.systemd:
        name: "{{ app_service_name }}"
        state: stopped

    - name: Update app code and dependencies
      ansible.builtin.include_role:
        name: app

    - name: Start app service
      ansible.builtin.systemd:
        name: "{{ app_service_name }}"
        state: started

    - name: Wait for service to stabilize
      ansible.builtin.pause:
        seconds: 3

    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Verify service is active
      ansible.builtin.assert:
        that:
          - ansible_facts.services[app_service_name + '.service'].state == 'running'
        fail_msg: "Service {{ app_service_name }} failed to start"
        success_msg: "Service {{ app_service_name }} is running"

    - name: Check recent logs
      ansible.builtin.command: "journalctl -u {{ app_service_name }} -n 20 --no-pager"
      register: update_service_logs
      changed_when: false
      failed_when: false

    - name: Show recent logs
      ansible.builtin.debug:
        var: update_service_logs.stdout_lines

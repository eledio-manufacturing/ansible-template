---
# Stop and disable VPN
# Usage: ansible-playbook vpn-disable.yml

- name: Disable VPN
  hosts: devices
  become: true

  tasks:
    - name: Stop and disable openvpn service
      ansible.builtin.systemd:
        name: "openvpn-client@{{ vpn_config_name }}"
        enabled: false
        state: stopped
